<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosul: Diachronic Mapping</title>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>

    <div id="sidebar">
        <h1>Mosul Evolution</h1>
        <p class="subtitle">Diachronic Urban Mapping Project</p>
        
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-label">Building Area</div>
                <div id="stat-buildings" class="stat-value">-- km²</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Road Length</div>
                <div id="stat-roads" class="stat-value">-- km</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Growth Factor</div>
                <div id="stat-growth" class="stat-value">-- x</div>
            </div>
        </div>

        <div id="layer-section">
            <div class="stat-label">Visible Layers</div>
            <div id="layer-toggles" class="layer-list">
                <!-- Layer checkboxes will be injected here -->
            </div>
        </div>
    </div>

    <div id="timeline-container">
        <div id="current-year" class="year-display">1852</div>
        <input type="range" id="timeline-slider" min="0" max="4" step="1" value="0">
        <div class="year-labels">
            <span>1852</span>
            <span>1906</span>
            <span>1919</span>
            <span>1944</span>
            <span>2020</span>
        </div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
